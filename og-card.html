<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  :root{
    --accent:#2dd4bf; --accent-2:#38bdf8;
    --ink:#e8eef5; --muted:#9fb3c8;
    --card-line:rgba(255,255,255,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    font-family:-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic UI",Meiryo,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1100px 600px at 88% -15%, rgba(56,189,248,.22), transparent 60%),
      radial-gradient(900px 560px at -8% 115%, rgba(45,212,191,.20), transparent 55%),
      linear-gradient(150deg,#0b1f33,#0f2740 55%,#0b1f33);
    -webkit-font-smoothing:antialiased;
    position:relative;
  }
  .frame{position:absolute;inset:26px;border:1px solid var(--card-line);border-radius:24px}
  .wrap{position:absolute;inset:0;padding:74px 80px;display:flex;flex-direction:column}

  .eyebrow{font-size:21px;letter-spacing:.28em;color:var(--accent);font-weight:800;text-transform:uppercase}
  .title{font-size:104px;font-weight:800;line-height:1.0;margin-top:18px;letter-spacing:.01em}
  .sub{font-size:33px;color:var(--muted);margin-top:22px;line-height:1.45;font-weight:500}
  .sub b{color:#fff;font-weight:800}
  .sub2{font-size:25px;color:var(--muted);margin-top:12px;font-weight:600}
  .sub2 b{color:#fff;font-weight:800}

  /* big watermark */
  .mark{position:absolute;right:54px;top:40px;font-size:230px;font-weight:800;
    color:transparent;-webkit-text-stroke:2px rgba(45,212,191,.18);letter-spacing:.02em;
    line-height:1;transform:rotate(-90deg);transform-origin:right top;white-space:nowrap;opacity:.9}

  .spacer{flex:1}
  .goal{display:flex;align-items:stretch;gap:14px;margin-bottom:30px}
  .g{padding:13px 22px;border-radius:14px;font-size:23px;font-weight:800;border:1px solid var(--card-line);
     display:flex;flex-direction:column;justify-content:flex-start}
  .g .s{display:block;font-size:14px;letter-spacing:.1em;font-weight:700;opacity:.85;margin-bottom:3px}
  .g.done{color:#06222b;background:linear-gradient(120deg,var(--accent),var(--accent-2));border-color:transparent}
  .g.now{color:#fff;border-color:rgba(56,189,248,.55)}
  .g.goal{color:#f5d77a;border:1px dashed rgba(245,215,122,.6);background:rgba(245,215,122,.06)}
  .g.goal .s{color:#f5d77a}
  .arr{color:var(--accent);font-size:30px;font-weight:800;align-self:center}

  .foot{display:flex;justify-content:space-between;align-items:center;
    border-top:1px solid var(--card-line);padding-top:26px}
  .who{font-size:25px;color:var(--ink);font-weight:700}
  .who b{color:var(--accent)}
  .url{font-size:22px;color:var(--muted);font-weight:600}
</style>
</head>
<body>
  <div class="mark">SUB&nbsp;3</div>
  <div class="frame"></div>
  <div class="wrap">
    <div class="eyebrow">AI Agent 活用実践 ・ Portfolio</div>
    <div class="title">Team Sub-3</div>
    <div class="sub">AIエージェントで挑む、<b>サブ3達成への道</b></div>
    <div class="sub2">その実践を、<b>業務変革への活用</b>へ</div>

    <div class="spacer"></div>

    <div class="foot">
      <div class="who">複数AIを役割分担　<b>Claude・Codex・Gemini</b></div>
      <div class="url">akatsukisaikou11-alt.github.io/sub3-portfolio</div>
    </div>
  </div>
</body>
</html>
